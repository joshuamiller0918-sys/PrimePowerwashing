<div class="section">
  <h2>Before & After</h2>

  <div class="slider">
    <img src="before.jpg" class="before">
    <img src="after.jpg" class="after" id="afterImage">
    <input type="range" min="0" max="100" value="50" id="sliderRange">
  </div>
</div>

<style>
.slider {
  position: relative;
  max-width: 500px;
  margin: auto;
}

.slider img {
  width: 100%;
  display: block;
  border-radius: 10px;
}

.after {
  position: absolute;
  top: 0;
  left: 0;
  clip-path: inset(0 50% 0 0);
}

#sliderRange {
  width: 100%;
  margin-top: 10px;
}
</style>

<script>
const slider = document.getElementById("sliderRange");
const after = document.getElementById("afterImage");

slider.addEventListener("input", function() {
  let value = slider.value;
  after.style.clipPath = `inset(0 ${100 - value}% 0 0)`;
});
</script>
