<div class="section">
  <h2>Before & After</h2>
  <div class="compare-box">
    <img src="before.jpg" alt="Before cleaning" class="compare-img">
    <div class="after-wrap" id="afterWrap">
      <img src="after.jpg" alt="After cleaning" class="compare-img">
    </div>
    <div class="divider" id="divider"></div>
  </div>
  <input type="range" min="0" max="100" value="50" id="compareSlider">
</div>

<style>
.compare-box {
  position: relative;
  width: 90%;
  max-width: 650px;
  aspect-ratio: 4 / 3;
  margin: 20px auto 10px;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  background: rgba(255,255,255,0.08);
}

.compare-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.after-wrap {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  height: 100%;
  overflow: hidden;
}

.divider {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 3px;
  height: 100%;
  background: white;
  box-shadow: 0 0 10px rgba(255,255,255,0.8);
}

#compareSlider {
  width: 90%;
  max-width: 650px;
  display: block;
  margin: 10px auto 0;
}
</style>

<script>
const compareSlider = document.getElementById("compareSlider");
const afterWrap = document.getElementById("afterWrap");
const divider = document.getElementById("divider");

compareSlider.addEventListener("input", function () {
  const value = this.value + "%";
  afterWrap.style.width = value;
  divider.style.left = value;
});
</script>
